<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iTools</title>
  </head>
  <body>
    <div id="app">
      <div class="panel">
        <div class="search-row">
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="21" y2="21" />
          </svg>
          <input
            id="query"
            type="text"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            placeholder="Hi"
          />
          <div id="avatar" class="avatar">i</div>
        </div>
        <div id="home"></div>
        <ul id="results" class="results"></ul>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
