<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理中心</title>
  </head>
  <body>
    <div class="admin">
      <!-- 自绘标题栏 -->
      <header class="titlebar" id="titlebar">
        <div class="tb-left">
          <span class="tb-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="2" y="2" width="20" height="20" rx="6" fill="#1f2329" />
              <path d="M7 8.5 L12 15 L17 8.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <circle cx="12" cy="17.5" r="1.3" fill="#fff" />
            </svg>
          </span>
          <span class="tb-title" id="tb-title">管理中心</span>
        </div>
        <div class="tb-right">
          <button class="tb-btn" id="tb-min" title="最小化" aria-label="最小化">
            <svg viewBox="0 0 12 12"><line x1="2.5" y1="6" x2="9.5" y2="6" stroke="currentColor" stroke-width="1.2" /></svg>
          </button>
          <button class="tb-btn" id="tb-max" title="最大化" aria-label="最大化">
            <svg viewBox="0 0 12 12"><rect x="2.5" y="2.5" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.2" /></svg>
          </button>
          <button class="tb-btn tb-close" id="tb-close" title="关闭" aria-label="关闭">
            <svg viewBox="0 0 12 12"><line x1="3" y1="3" x2="9" y2="9" stroke="currentColor" stroke-width="1.2" /><line x1="9" y1="3" x2="3" y2="9" stroke="currentColor" stroke-width="1.2" /></svg>
          </button>
        </div>
      </header>

      <div class="admin-body">
        <!-- 左侧导航 -->
        <nav class="sidebar">
          <div class="nav-scroll">
            <div class="nav-group">
              <div class="nav-group-title">个人中心</div>
              <button class="nav-item" data-view="account">
                <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/></svg>
                <span>我的账号</span>
              </button>
              <button class="nav-item" data-view="data">
                <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="8" y1="7" x2="20" y2="7"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="17" x2="20" y2="17"/><circle cx="4" cy="7" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="17" r="1"/></svg>
                <span>我的数据</span>
              </button>
            </div>

            <div class="nav-group">
              <div class="nav-group-title">偏好设置</div>
              <button class="nav-item" data-view="settings">
                <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-2.7-1.1l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.1-2.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
                <span>设置</span>
              </button>
              <button class="nav-item" data-view="ai">
                <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 2v4"/><path d="M15 2v4"/><path d="M8 6h8v5a4 4 0 0 1-8 0z"/><path d="M12 15v3a4 4 0 0 0 4 4h1"/></svg>
                <span>AI Agent 连接</span>
              </button>
              <button class="nav-item" data-view="launch">
                <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 15c-1 1-1.5 4-1.5 4s3-.5 4-1.5c.6-.6.6-1.9 0-2.5s-1.9-.6-2.5 0z"/><path d="M9 12l3 3M15 3c-3 0-6 2-9 9 0 0 3 3 3 3 7-3 9-6 9-9a3 3 0 0 0-3-3z"/><circle cx="15" cy="9" r="1.4"/></svg>
                <span>本地启动</span>
              </button>
              <button class="nav-item" data-view="plugins">
                <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 2v4M15 2v4"/><path d="M7 6h10v4a5 5 0 0 1-10 0z"/><path d="M12 15v5"/></svg>
                <span>插件管理</span>
              </button>
              <button class="nav-item" data-view="all">
                <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
                <span>所有功能</span>
              </button>
            </div>
          </div>

          <div class="sidebar-footer">
            <button class="nav-item nav-market" data-view="market">
              <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 9V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3M4 9l1 11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1l1-11M4 9h16M9 13h6"/></svg>
              <span>插件应用市场</span>
            </button>
          </div>
        </nav>

        <!-- 右侧内容 -->
        <main class="content" id="content"></main>
      </div>

      <div id="toast" class="toast"></div>
    </div>
    <script type="module" src="/src/admin/main.ts"></script>
  </body>
</html>
